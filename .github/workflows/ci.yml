name: CI / CD — IntelPulse TI Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint (runs in parallel with ui-lint) ──────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + mypy only
        # Ruff is static analysis — doesn't need the full FastAPI stack to
        # check api/ + worker/. Skipping the ~30-pkg install saves ~25s.
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check api/ worker/

  # ── UI lint + typecheck (parallel with python-lint) ──────────
  ui-lint:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: cd ui && npm ci

      - name: TypeScript check
        run: cd ui && npx tsc --noEmit

  # ── Deploy to Hostinger VPS via SSH ──────────────────────────
  deploy:
    name: Deploy to Production
    needs: [python-lint, ui-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: /opt/IntelPulse/scripts/deploy.sh
