name: CI / CD — IntelPulse TI Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # required for ECR OIDC in build-and-push
  contents: read

jobs:
  # ── Python lint (runs in parallel with ui-lint) ──────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + mypy only
        # Ruff is static analysis — doesn't need the full FastAPI stack to
        # check api/ + worker/. Skipping the ~30-pkg install saves ~25s.
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check api/ worker/

  # ── UI lint + typecheck (parallel with python-lint) ──────────
  ui-lint:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: cd ui && npm ci

      - name: TypeScript check
        run: cd ui && npx tsc --noEmit

  # ── ECR build + push (parallel matrix; gates the deploy) ─────
  # Build each application Dockerfile on GH runners and push to ECR
  # under both `${github.sha}` and `latest`. The deploy step pulls
  # these tagged images instead of building on the VPS.
  build-and-push:
    name: Build + push ${{ matrix.service }}
    needs: [python-lint, ui-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
          - service: ui
            dockerfile: docker/Dockerfile.ui
          - service: worker
            dockerfile: docker/Dockerfile.worker
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:buildcache,mode=max

  # ── Deploy to Hostinger VPS via SSH ──────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH (ECR pull)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          # Pass the commit SHA so deploy-ecr.sh pulls the exact image
          # this commit produced, not just `latest` (which would race
          # against a concurrent push).
          envs: GITHUB_SHA
          # Invoke via `bash` (not direct exec) so we do NOT depend on
          # the +x bit already being set on the on-disk copy from the
          # previous deploy. First `git fetch + reset` refreshes the
          # checkout, THEN we run the new version of the script.
          script: |
            cd /opt/IntelPulse
            git fetch origin main
            git reset --hard origin/main
            IMAGE_TAG="${GITHUB_SHA}" bash scripts/deploy-ecr.sh
        env:
          GITHUB_SHA: ${{ github.sha }}

      # CF caches the HTML shell of `/` and `/dashboard` with an effectively
      # indefinite TTL (s-maxage=31536000). Each deploy rotates shared-chunk
      # hashes, so stale HTML ends up referencing chunks that 404 → blank
      # page. Purge the HTML shells once the SSH deploy reports healthy.
      # Non-fatal on failure: the deploy itself is done, users can hit CF
      # purge manually if this step misfires.
      - name: Purge Cloudflare HTML cache
        if: success()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CF_API_TOKEN or CF_ZONE_ID secret missing — skipping purge. Stale HTML may serve 404'd chunks until the CF Cache Rule TTL expires."
            exit 0
          fi
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://intelpulse.tech/","https://intelpulse.tech/dashboard"]}')
          echo "$resp"
          if echo "$resp" | grep -q '"success":true'; then
            echo "CF purge OK for / + /dashboard"
          else
            echo "::warning::CF purge API returned non-success. Manual purge may be required."
          fi
