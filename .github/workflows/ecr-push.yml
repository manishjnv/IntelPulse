name: ECR build + push

# Builds the 3 application images (api, ui, worker) on every push to main
# and pushes them to ECR under both the commit SHA and `latest`. The
# scheduler service reuses the worker image — see docker-compose.ecr.yml.
#
# This workflow is inert until AWS resources are provisioned (see
# scripts/provision_ecr.py) — the OIDC AssumeRole call will 403 and the
# job will fail. `continue-on-error` on the whole job keeps the legacy
# CI pipeline unblocked while we ramp up.
#
# Once provisioned and running cleanly, this becomes the source of truth
# for production images; the in-VPS docker build in scripts/deploy.sh
# becomes fallback-only.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ecr-push-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build-and-push:
    name: Build + push ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Keep ECR failures from blocking the main CI deploy until AWS is
    # provisioned and at least one successful run exists.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
          - service: ui
            dockerfile: docker/Dockerfile.ui
          - service: worker
            dockerfile: docker/Dockerfile.worker
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/intelpulse/${{ matrix.service }}:buildcache,mode=max
