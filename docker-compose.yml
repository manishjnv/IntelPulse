x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
  POSTGRES_USER: ${POSTGRES_USER:-ti}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  OPENSEARCH_URL: http://opensearch:9200
  LOG_LEVEL: INFO
  ENVIRONMENT: production

services:
  # ── Data stores ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ti} -d ${POSTGRES_DB:-ti_platform}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}" --protected-mode yes --rename-command REPLICAOF "" --rename-command SLAVEOF "" --rename-command DEBUG "" --rename-command CONFIG ""'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Application ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DOMAIN: ${DOMAIN:-IntelPulse.in}
      DOMAIN_UI: ${DOMAIN_UI:-https://IntelPulse.in}
      DOMAIN_API: ${DOMAIN_API:-http://localhost:8000}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@IntelPulse.in}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-IntelPulse}
      EMAIL_OTP_ENABLED: ${EMAIL_OTP_ENABLED:-false}
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    restart: unless-stopped
    environment:
      BACKEND_URL: http://api:8000
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      <<: *common-env
      NVD_API_KEY: ${NVD_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
    healthcheck:
      # Verifies the RQ worker loop is consuming jobs (fresh heartbeat in
      # Redis). A simple `ps` check would pass for a deadlocked process;
      # this probe catches real stalls so `restart: unless-stopped` kicks in.
      test: ["CMD", "python", "-m", "worker.worker_healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    command: ["python", "-m", "worker.scheduler"]
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "python", "-m", "worker.healthcheck"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  # ── Cloudflare Tunnel (deprecated — replaced by Caddy) ──
  # cloudflared has been removed. Caddy handles TLS termination.

  # ── Reverse Proxy (Caddy — auto HTTPS via Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - ui
      - api

volumes:
  pg_data:
  redis_data:
  os_data:
  caddy_data:
  caddy_config:
