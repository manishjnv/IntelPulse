version: '3.8'
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ti}" ]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AI_API_URL: bedrock
      AI_MODEL: ${AI_MODEL:-amazon.nova-lite-v1:0}
      AI_ENABLED: "true"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: INFO
      DEV_BYPASS_AUTH: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AI_API_URL: bedrock
      AI_MODEL: ${AI_MODEL:-amazon.nova-lite-v1:0}
      AI_ENABLED: "true"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    command: [ "python", "-m", "worker.scheduler" ]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ti_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AI_API_URL: bedrock
      AI_MODEL: ${AI_MODEL:-amazon.nova-lite-v1:0}
      AI_ENABLED: "true"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_URL: http://api:8000
      NEXT_PUBLIC_API_URL: https://intelpulse.tech
      NODE_ENV: production
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
